name: CI/CD

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mijnmotorparkeren

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: 'mijnmotorparkeren/package-lock.json'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Run linter
      run: npm run lint

    #- name: Run type check
    #  run: npm run type-check

    #- name: Validate data files
    #  run: npm run validate:data

    #- name: Run tests
    #  run: npm test

    # Create .env file (using GitHub Repository variables)
    - name: Create .env file with GitHub variables
      run: |
        echo "PUBLIC_MAP_TILE_URL=https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" > .env
        echo "PUBLIC_MAP_ATTRIBUTION=© OpenStreetMap contributors" >> .env
        echo "PUBLIC_DEFAULT_CENTER_LAT=${{ vars.PUBLIC_DEFAULT_CENTER_LAT }}" >> .env
        echo "PUBLIC_DEFAULT_CENTER_LNG=${{ vars.PUBLIC_DEFAULT_CENTER_LNG }}" >> .env
        echo "PUBLIC_DEFAULT_ZOOM=${{ vars.PUBLIC_DEFAULT_ZOOM }}" >> .env
        echo "PUBLIC_DATA_VERSION=$(date +%Y%m%d)" >> .env

    - name: Build
      run: npm run build

    - name: Generate sitemap
      run: node scripts/generate-sitemap.js

    # Upload build artifacts for the deploy job
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: mijnmotorparkeren/dist/

    - name: Upload data files
      uses: actions/upload-artifact@v4
      with:
        name: data-files
        path: mijnmotorparkeren/data/

  # New job to build and push Docker image
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./mijnmotorparkeren
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          PUBLIC_MAP_TILE_URL=https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
          PUBLIC_MAP_ATTRIBUTION=© OpenStreetMap contributors
          PUBLIC_DEFAULT_CENTER_LAT=${{ vars.PUBLIC_DEFAULT_CENTER_LAT }}
          PUBLIC_DEFAULT_CENTER_LNG=${{ vars.PUBLIC_DEFAULT_CENTER_LNG }}
          PUBLIC_DEFAULT_ZOOM=${{ vars.PUBLIC_DEFAULT_ZOOM }}
          PUBLIC_DATA_VERSION=${{ github.run_id }}
