services:
  mijnmotorparkeren:
    image: ghcr.io/hawkinslabdev/mijnmotorparkeren:latest
    container_name: mijnmotorparkeren
    ports:
      - "3000:4321"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4321/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 90s
      timeout: 30s
      retries: 3
      start_period: 15s
